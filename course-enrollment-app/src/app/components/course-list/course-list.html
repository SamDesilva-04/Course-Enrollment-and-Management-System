<div class="container" style="padding: 20px;">
  <h2>Available Courses</h2>

  <table mat-table [dataSource]="courses" class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let course"> {{course.id}} </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Course Title </th>
      <td mat-cell *matCellDef="let course"> {{course.title}} </td>
    </ng-container>

    <ng-container matColumnDef="credits">
      <th mat-header-cell *matHeaderCellDef> Credits </th>
      <td mat-cell *matCellDef="let course"> {{course.credits}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
